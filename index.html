<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chrome Dino Game Clone</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
      import { getDatabase, ref, set, update, push, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyBRKE4f7jroFokwhJlorsI3UCB4VfIj6aY",
        authDomain: "festafinalistajogolobo.firebaseapp.com",
        databaseURL: "https://festafinalistajogolobo-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "festafinalistajogolobo",
        storageBucket: "festafinalistajogolobo.firebasestorage.app",
        messagingSenderId: "69184567276",
        appId: "1:69184567276:web:8a5e594acd8d036969b2c9",
        measurementId: "G-BCERQRHBH3"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const rtdb = getDatabase(app, firebaseConfig.databaseURL); // Ligação explícita à URL
      const analytics = getAnalytics(app);

      // Expose to window for game.js
      window.firebaseDB = db;
      window.firebaseRTDB = rtdb;
      window.firestore = { collection, addDoc, getDocs, query, where };
      window.rtdb = { ref, set, update, push, onValue, get, child };

      // Teste de escrita imediato para validar ligação
      set(ref(rtdb, 'connection_test'), {
        status: "online",
        lastAttempt: new Date().toISOString()
      }).then(() => console.log("Teste de escrita RTDB: SUCESSO!"))
        .catch(e => console.error("Teste de escrita RTDB: FALHOU", e));

      console.log("Firebase inicializado com sucesso!");
    </script>
</head>
<body>
    <div id="login-overlay">
        <div id="login-box">
            <h2>Festa Finalista - Login</h2>
            <div id="login-form">
                <input type="text" id="insta-handle" placeholder="@ do instagram" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <div class="button-group">
                    <button id="btn-login">Entrar</button>
                    <button id="btn-signup">Criar Conta</button>
                </div>
                <p id="login-error"></p>
            </div>
        </div>
    </div>
    <div id="night-background"></div>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>
    <div id="mobile-controls">
        <div class="controls-left-group">
            <button id="btn-left">←</button>
            <button id="btn-right">→</button>
        </div>
        <div class="controls-right-group">
            <button id="btn-down">↓</button>
            <button id="btn-jump">↑</button>
        </div>
    </div>
    <script type="module" src="game_v2.js"></script>
</body>
</html>
